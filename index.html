<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVD Consulting — Développement Commercial au Gabon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0e1d42;
    --navy-light: #1a2f5e;
    --navy-dark: #080f22;
    --gold: #b8922a;
    --gold-light: #d4aa45;
    --gold-pale: #f0e4c2;
    --white: #f8f7f3;
    --off-white: #ede9df;
    --gray: #6b6b6b;
    --gray-light: #e8e5de;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--white);
    color: var(--navy);
    overflow-x: hidden;
  }
  h1, h2, h3, h4 { font-family: 'Cormorant Garamond', Georgia, serif; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .anim-fadeup { animation: fadeUp 0.7s ease both; }
  .anim-fadein { animation: fadeIn 0.8s ease both; }
  .anim-d1 { animation-delay: 0.1s; }
  .anim-d2 { animation-delay: 0.25s; }
  .anim-d3 { animation-delay: 0.4s; }
  .anim-d4 { animation-delay: 0.55s; }
  .anim-d5 { animation-delay: 0.7s; }

  /* SCROLLREVEAL */
  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.75s ease, transform 0.75s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.32s; }
  .reveal-delay-4 { transition-delay: 0.45s; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    transition: background 0.3s, box-shadow 0.3s;
  }
  nav.scrolled {
    background: rgba(10, 20, 50, 0.92);
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: 0 1px 0 rgba(184,146,42,0.18), 0 4px 32px rgba(0,0,0,0.22);
    border-bottom: 1px solid rgba(184,146,42,0.12);
  }
  nav.transparent {
    background: linear-gradient(180deg, rgba(0,0,0,0.28) 0%, transparent 100%);
  }
  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 48px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
  .nav-logo img { height: 72px; width: auto; background: none; padding: 0; filter: drop-shadow(0 1px 6px rgba(0,0,0,0.35)); }
  .nav-links { display: flex; align-items: center; gap: 36px; }
  .nav-links a {
    color: rgba(255,255,255,0.82);
    text-decoration: none;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
    cursor: pointer;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold-light); border-bottom-color: var(--gold-light); }
  .nav-cta {
    background: var(--gold);
    color: white !important;
    padding: 10px 22px;
    letter-spacing: 0.1em;
    font-weight: 700 !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--gold-light) !important; color: white !important; }

  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 2px; background: white; transition: 0.3s; }
  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px; left: 0; right: 0;
    background: var(--navy-dark);
    padding: 24px 40px;
    flex-direction: column;
    gap: 20px;
    z-index: 99;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: rgba(255,255,255,0.88);
    text-decoration: none;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 680px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('uploads/ChatGPT Image 23 avr. 2026, 01_20_16.png');
    background-size: cover;
    background-position: center 40%;
    transform: scale(1.04);
    animation: slowZoom 14s ease-out both;
  }
  @keyframes slowZoom {
    from { transform: scale(1.08); }
    to { transform: scale(1.0); }
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, rgba(8,15,34,0.82) 0%, rgba(8,15,34,0.62) 55%, rgba(8,15,34,0.25) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 40px;
    width: 100%;
    padding-top: 72px;
  }
  .hero-left { max-width: 600px; }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 32px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    opacity: 0.92;
  }
  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold-light);
  }
  .hero-title {
    font-size: clamp(40px, 5.5vw, 72px);
    font-weight: 300;
    color: white;
    line-height: 1.08;
    margin-bottom: 28px;
    letter-spacing: -0.015em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.18);
  }
  .hero-title em { font-style: italic; color: var(--gold-light); font-weight: 400; }
  .hero-sub {
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    line-height: 1.75;
    margin-bottom: 48px;
    font-weight: 300;
    max-width: 500px;
    letter-spacing: 0.01em;
  }
  .hero-ctas { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 64px; }
  .btn-primary {
    background: linear-gradient(135deg, #c9a84c 0%, #b8922a 60%, #a07820 100%);
    color: white;
    padding: 16px 36px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: box-shadow 0.25s, transform 0.18s, filter 0.2s;
    font-family: 'Lato', sans-serif;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 4px 20px rgba(184,146,42,0.32);
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    pointer-events: none;
  }
  .btn-primary:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(184,146,42,0.42);
  }
  .btn-secondary {
    background: transparent;
    color: white;
    padding: 15px 32px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.45);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: 'Lato', sans-serif;
    text-decoration: none;
    display: inline-block;
  }
  .btn-secondary:hover { border-color: var(--gold-light); color: var(--gold-light); }
  .hero-keypoints {
    display: flex;
    gap: 36px;
    flex-wrap: wrap;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .hero-kp {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.68);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hero-kp::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    background: var(--gold);
    flex-shrink: 0;
    transform: rotate(45deg);
  }

  /* SECTION WRAPPERS */
  section { padding: 96px 0; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
  .section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: var(--gold);
  }
  .section-title {
    font-size: clamp(30px, 3.5vw, 48px);
    font-weight: 400;
    line-height: 1.15;
    color: var(--navy);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .section-title.light { color: white; }
  .section-sub {
    font-size: 16px;
    color: var(--gray);
    line-height: 1.7;
    max-width: 560px;
    font-weight: 300;
  }
  .section-sub.light { color: rgba(255,255,255,0.65); }

  /* PROBLEMATIQUES */
  .problems { background: var(--white); }
  .problems-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-top: 56px;
  }
  .problem-card {
    background: var(--off-white);
    padding: 40px 32px;
    border-top: 3px solid transparent;
    transition: border-color 0.25s, background 0.25s;
  }
  .problem-card:hover { border-color: var(--gold); background: white; }
  .problem-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    color: var(--gold-pale);
    line-height: 1;
    margin-bottom: 20px;
  }
  .problem-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .problem-desc { font-size: 14px; color: var(--gray); line-height: 1.65; font-weight: 300; }

  /* APPROCHE / MÉTHODE DARK */
  .approche { background: var(--navy-dark); }
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.06);
    margin-top: 56px;
  }
  .step-card {
    background: var(--navy-dark);
    padding: 48px 32px;
    position: relative;
    transition: background 0.25s;
  }
  .step-card:hover { background: rgba(184,146,42,0.06); }
  .step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 300;
    color: rgba(184,146,42,0.18);
    line-height: 1;
    margin-bottom: 20px;
  }
  .step-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .step-title {
    font-size: 24px;
    font-weight: 500;
    color: white;
    margin-bottom: 14px;
  }
  .step-desc { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; font-weight: 300; }
  .step-connector {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 60px;
    background: rgba(184,146,42,0.25);
  }
  .approche-cta { text-align: center; margin-top: 56px; }

  /* OFFRE CARDS */
  .offre-section { background: var(--white); }
  .offre-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 56px;
  }
  .offre-card {
    background: var(--off-white);
    padding: 44px 32px;
    border-bottom: 3px solid transparent;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    cursor: pointer;
  }
  .offre-card:hover {
    border-color: var(--gold);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    transform: translateY(-3px);
  }
  .offre-icon {
    width: 44px;
    height: 44px;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .offre-icon svg { width: 20px; height: 20px; stroke: var(--gold); fill: none; stroke-width: 1.5; }
  .offre-card-title { font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 12px; }
  .offre-card-desc { font-size: 14px; color: var(--gray); line-height: 1.7; font-weight: 300; margin-bottom: 20px; }
  .offre-link {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: gap 0.2s;
  }
  .offre-link:hover { gap: 14px; }
  .offre-link::after { content: '→'; }

  /* CTA BAND */
  .cta-band {
    background: var(--navy);
    padding: 80px 0;
    text-align: center;
  }
  .cta-band h2 {
    font-size: clamp(28px, 3vw, 44px);
    font-weight: 300;
    color: white;
    margin-bottom: 12px;
  }
  .cta-band p { color: rgba(255,255,255,0.6); margin-bottom: 36px; font-size: 16px; font-weight: 300; }

  /* PAGE HEADER */
  .page-header {
    background: var(--navy-dark);
    padding: 140px 0 64px;
    position: relative;
    overflow: hidden;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .page-header-label { color: var(--gold); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 16px; font-family: 'Lato', sans-serif; }
  .page-header h1 { font-size: clamp(36px, 5vw, 62px); color: white; font-weight: 300; line-height: 1.1; margin-bottom: 16px; }
  .page-header p { font-size: 17px; color: rgba(255,255,255,0.6); font-weight: 300; max-width: 600px; line-height: 1.65; }

  /* OFFRE PAGE */
  .offre-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    margin-bottom: 2px;
  }
  .offre-block-main {
    background: var(--navy);
    color: white;
    padding: 64px 56px;
  }
  .offre-block-main h2 { font-size: 36px; font-weight: 400; color: white; margin-bottom: 20px; line-height: 1.15; }
  .offre-block-main p { color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1.7; font-weight: 300; margin-bottom: 20px; }
  .offre-block-side {
    background: var(--off-white);
    padding: 64px 48px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .offre-detail-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    margin-bottom: 12px;
  }
  .offre-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .offre-list li {
    font-size: 14px;
    color: var(--navy);
    padding-left: 18px;
    position: relative;
    line-height: 1.5;
    font-weight: 400;
  }
  .offre-list li::before {
    content: '';
    position: absolute;
    left: 0; top: 7px;
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  .formats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 56px;
  }
  .format-card {
    background: var(--off-white);
    padding: 40px 32px;
    border-top: 2px solid var(--gold);
  }
  .format-duration { font-size: 13px; color: var(--gold); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 12px; font-family: 'Lato', sans-serif; }
  .format-title { font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 12px; }
  .format-desc { font-size: 14px; color: var(--gray); line-height: 1.65; font-weight: 300; }

  .do-dont {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    margin-top: 56px;
  }
  .do-card { background: var(--navy); padding: 48px 40px; }
  .dont-card { background: var(--off-white); padding: 48px 40px; }
  .do-card h3 { color: var(--gold-light); font-size: 22px; font-weight: 400; margin-bottom: 24px; }
  .dont-card h3 { color: var(--navy); font-size: 22px; font-weight: 400; margin-bottom: 24px; }
  .do-list, .dont-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .do-list li { color: rgba(255,255,255,0.75); font-size: 14px; padding-left: 20px; position: relative; line-height: 1.5; font-weight: 300; }
  .dont-list li { color: var(--gray); font-size: 14px; padding-left: 20px; position: relative; line-height: 1.5; font-weight: 300; }
  .do-list li::before { content: '✓'; position: absolute; left: 0; color: var(--gold); font-size: 12px; top: 1px; }
  .dont-list li::before { content: '×'; position: absolute; left: 0; color: #999; font-size: 14px; top: 0; }

  /* MÉTHODE PAGE */
  .methode-steps { display: flex; flex-direction: column; gap: 2px; margin-top: 56px; }
  .methode-step {
    display: grid;
    grid-template-columns: 80px 1fr 1fr;
    gap: 0;
    background: var(--off-white);
    overflow: hidden;
    transition: box-shadow 0.25s;
  }
  .methode-step:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .methode-step-num {
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--gold);
    padding: 40px 0;
  }
  .methode-step-main { padding: 40px 40px; }
  .methode-step-main h3 { font-size: 26px; font-weight: 500; color: var(--navy); margin-bottom: 10px; }
  .methode-step-main p { font-size: 14px; color: var(--gray); line-height: 1.7; font-weight: 300; }
  .methode-step-livrable {
    background: white;
    padding: 40px 40px;
    border-left: 2px solid var(--gold-pale);
  }
  .livrable-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 12px; font-family: 'Lato', sans-serif; }
  .livrable-item { font-size: 14px; color: var(--navy); padding: 6px 0; border-bottom: 1px solid var(--gray-light); font-weight: 400; }

  .livrables-table { width: 100%; border-collapse: collapse; margin-top: 40px; }
  .livrables-table th {
    background: var(--navy);
    color: white;
    padding: 16px 20px;
    text-align: left;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .livrables-table td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--gray-light);
    font-size: 14px;
    color: var(--navy);
  }
  .livrables-table tr:nth-child(even) td { background: var(--off-white); }
  .check { color: var(--gold); font-weight: 700; }
  .dash { color: #ccc; }

  /* FAQ PAGE */
  .faq-group { margin-bottom: 56px; }
  .faq-group-title {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-weight: 700;

// ────────── SCROLL REVEAL ──────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);

  const go = (p) => { setPage(p); setMobileOpen(false); window.scrollTo(0,0); };

  const links = [

function PageContact() {
  useReveal();
  const [form, setForm] = useState({ prenom: '', nom: '', entreprise: '', fonction: '', email: '', tel: '', message: '' });
  const [sent, setSent] = useState(false);
  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!form.prenom) e.prenom = true;
    if (!form.nom) e.nom = true;
    if (!form.email || !form.email.includes('@')) e.email = true;
    return e;
  };

  const submit = (ev) => {
    ev.preventDefault();
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0) setSent(true);
  };

  return (
    <>

        <div className="container">
          <div className="page-header-label anim-fadeup anim-d1">Contact</div>

function App() {

  useEffect(() => { window.scrollTo(0,0); }, [page]);

  const renderPage = () => {
    switch(page) {
      case 'accueil': return <PageAccueil setPage={setPage} />;
      case 'offre': return <PageOffre setPage={setPage} />;
      case 'methode': return <PageMethode setPage={setPage} />;
      case 'faq': return <PageFAQ setPage={setPage} />;
      case 'contact': return <PageContact setPage={setPage} />;
      default: return <PageAccueil setPage={setPage} />;

  };

  return (
    <>
      <Nav page={page} setPage={setPage} />
      <main>{renderPage()}</main>
      <Footer setPage={setPage} />
    </>
  );
}
